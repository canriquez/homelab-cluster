# DB connection for the prod app (namespace rayces-production). The chart envFroms
# this AFTER raycesv3-environment, so these POSTGRES_* keys win — repointing prod at
# CNPG on the dedicated `raycesv3` role. Prod runs RAILS_ENV=production → reads
# POSTGRES_DB_PRODUCTION (kept as raycesv3_production, the real prod DB).
#
# POSTGRES_PASSWORD must equal the password in
# database/instances/prod/app-secret.yaml.
#
# Encrypt BEFORE committing:
#   sops --encrypt --in-place database/app-secrets/prod/connection-secret.yaml
