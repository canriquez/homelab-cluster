# DB connection for the staging app (namespace raycesv3-staging). The chart
# envFroms this AFTER raycesv3-environment, so these POSTGRES_* keys win —
# repointing staging at CNPG on the dedicated `raycesv3` role. Staging runs
# RAILS_ENV=production, so it reads POSTGRES_DB_PRODUCTION — which we point at the
# clearly-named `raycesv3_staging` database (not `raycesv3_production`).
#
# POSTGRES_PASSWORD must equal the password in
# database/instances/staging/app-secret.yaml.
#
# Encrypt BEFORE committing:
#   sops --encrypt --in-place database/app-secrets/staging/connection-secret.yaml
