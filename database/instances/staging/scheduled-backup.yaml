apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: rayces-db-staging-monthly
  namespace: rayces-db-staging
spec:
  # 6-field cron (seconds first). "0 0 0 1 * *" = 00:00:00 on the 1st of every month.
  # Staging is a disposable prod-clone for testing, so monthly base backups are plenty.
  # (WAL is still archived continuously — CNPG requires it for consistent base backups —
  # but it's negligible for staging's low write volume.)
  schedule: "0 0 0 1 * *"
  backupOwnerReference: self
  cluster:
    name: rayces-db-staging
