apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rayces
  namespace: rayces-production
spec:
  interval: 5m
  chart:
    spec:
      chart: charts/rayces
      # Re-render on every git revision, not just chart-version bumps — otherwise
      # chart template changes (e.g. externalDb support) silently don't reach prod
      # while Chart.yaml version is unchanged.
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: rayces-v3
        namespace: flux-system
      interval: 1m
  values:
    global:
      namespace: rayces-production
      secretName: raycesv3-environment
    # Repoint prod at CloudNativePG (rayces-db-prod, DB raycesv3_production). The
    # rayces-db-connection secret (Flux/SOPS, rayces-production ns) supplies the
    # POSTGRES_* creds for the dedicated `raycesv3` role and overrides the env secret.
    # In-chart Postgres stays deployed (postgres.enabled true) for blue/green rollback.
    # ⚠️ MERGE THIS ONLY DURING THE CUTOVER WINDOW, AFTER the dump/restore — otherwise
    #    Flux repoints the live app at an empty CNPG DB.
    externalDb:
      enabled: true
      host: "rayces-db-prod-rw.rayces-db-prod.svc.cluster.local"
      port: 5432
      secretName: rayces-db-connection
    images:
      backend:
        repository: ghcr.io/canriquez/rayces-backend
        tag: "20260601021038-51c79ed" # {"$imagepolicy": "flux-system:rayces-backend:tag"}
        pullPolicy: Always
        pullSecret: ghcr-credentials
      frontend:
        repository: ghcr.io/canriquez/rayces-frontend
        tag: "20260601021038-51c79ed" # {"$imagepolicy": "flux-system:rayces-frontend:tag"}
        pullPolicy: Always
        pullSecret: ghcr-credentials
    rails:
      replicas: 2
      env: production
      autoSeed: false
      # 20-concurrent-user headroom. Live state before this change sat at
      # 83-85% of the chart-default 768Mi limit, leaving ~120Mi per pod —
      # too thin for traffic spikes or large queries. Doubling the limit
      # to 1536Mi gives ~37% headroom; bumping request from 512Mi to 768Mi
      # stops k8s from over-scheduling pods that actually need more.
      resources:
        requests:
          memory: "768Mi"
          cpu: "250m"
        limits:
          memory: "1536Mi"
          cpu: "2000m"
    sidekiq:
      concurrency: "10"
      # concurrency:10 doubles the chart default of 5. Bump the memory
      # limit accordingly so jobs don't OOMKill under load. Chart default
      # is 1Gi; production gets 2Gi to match the concurrency increase.
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "2Gi"
          cpu: "1000m"
    nextjs:
      replicas: 2
      command: ["node", "server.js"]
      nodeEnv: production
      # Node.js server in production mode is lighter than rails. 1Gi
      # limit gives headroom for SSR cache growth.
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
    mailcatcher:
      enabled: false
    cloudflare:
      enabled: true
      replicas: 2
      tunnel: rayces-production
      ingress:
        appHostname: citas.rayces.com
    postgres:
      metrics:
        enabled: true
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
