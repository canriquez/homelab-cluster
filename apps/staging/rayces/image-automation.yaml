---
# GitRepository with write access — used by ImageUpdateAutomation to commit tag updates back to homelab-cluster
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: homelab-cluster-write
  namespace: flux-system
spec:
  interval: 1m
  url: ssh://git@github.com/canriquez/homelab-cluster
  ref:
    branch: main
  secretRef:
    name: flux-write-credentials
---
# ImageRepository — watches ghcr.io for new rayces-backend tags
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: rayces-backend
  namespace: flux-system
spec:
  image: ghcr.io/canriquez/rayces-backend
  interval: 1m
  secretRef:
    name: ghcr-flux-system-credentials
---
# ImageRepository — watches ghcr.io for new rayces-frontend tags
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: rayces-frontend
  namespace: flux-system
spec:
  image: ghcr.io/canriquez/rayces-frontend
  interval: 1m
  secretRef:
    name: ghcr-flux-system-credentials
---
# ImagePolicy — selects the newest rayces-backend tag by numeric timestamp.
# Tag format: YYYYMMDDHHMMSS-<sha> (e.g. 20260530180500-2c7af7d). `extract`
# pulls the leading timestamp; `numerical asc` picks the largest = most recent.
# Legacy 8-digit YYYYMMDD-<sha> tags still match and sort below the 14-digit ones.
# (alphabetical-on-sha could not order two same-day commits — see rayces-v3 CI.)
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: rayces-backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: rayces-backend
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
# ImagePolicy — selects the newest rayces-frontend tag by numeric timestamp (see backend note)
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: rayces-frontend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: rayces-frontend
  filterTags:
    pattern: '^(?P<ts>[0-9]+)-[a-f0-9]+$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
---
# ImageUpdateAutomation — commits new image tags back to homelab-cluster when policies fire
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: rayces
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: homelab-cluster-write
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        name: flux-image-automation
        email: flux@experientialabs.net
      messageTemplate: 'chore: update rayces images'
    push:
      branch: main
  update:
    strategy: Setters
    path: ./apps/staging/rayces
